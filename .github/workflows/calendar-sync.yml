name: calendar-sync

# Mirrors the live cohort schedule (served at the public Phala URL hard-coded
# in scripts/sync-calendar.js) into cohort-data/calendar.json. Runs every 30
# minutes; on drift, opens a PR against main with the updated snapshot.
#
# Why a PR and not a direct push:
#   - A merged PR gives a human-readable audit trail of schedule changes
#   - Maintainers can sanity-check large or unexpected diffs before they hit
#     the bundled surface
#
# Auth model:
#   The Phala endpoint is publicly readable. The Google service account key
#   that backs Phala stays inside Phala (or, if we ever move that piece in-
#   repo, lives only as a GitHub Secret consumed by Phala-side code). This
#   workflow needs no secrets beyond the default GITHUB_TOKEN.

on:
  schedule:
    # every 30 minutes; GitHub may delay scheduled runs under load
    - cron: "*/30 * * * *"
  workflow_dispatch:        # manual run from the Actions tab
  push:
    paths:
      - "scripts/sync-calendar.js"
      - ".github/workflows/calendar-sync.yml"

permissions:
  contents: write
  pull-requests: write

# If a previous sync run is still mid-flight, let it finish — never run two
# in parallel against the same branch (would race on the cohort-data/calendar
# branch).
concurrency:
  group: calendar-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: fetch upstream → cohort-data/calendar.json
        run: node scripts/sync-calendar.js

      - name: detect drift
        id: drift
        run: |
          if [[ -z "$(git status --porcelain cohort-data/calendar.json)" ]]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "no schedule change — exiting"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat cohort-data/calendar.json
          fi

      - name: open / update PR
        if: steps.drift.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/calendar-sync
          delete-branch: true
          base: main
          add-paths: cohort-data/calendar.json
          commit-message: |
            chore(calendar): sync cohort-data/calendar.json from Phala
          title: "chore(calendar): sync schedule from Phala"
          body: |
            Automated calendar sync — pulled the latest schedule from the Phala-hosted upstream and rewrote `cohort-data/calendar.json`.

            Triggered by the `calendar-sync` workflow. Diff above is the actual schedule change (the `last_refresh` field alone never opens a PR).

            Merge to ship the update into the next bundled cohort surface.
          labels: |
            calendar
            automated
