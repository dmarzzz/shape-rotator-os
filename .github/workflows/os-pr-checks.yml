name: os-pr-checks

on:
  # No path filter: this runs on EVERY PR so it can be set as a REQUIRED
  # status check on main without the classic footgun — a path-filtered
  # required check never triggers on non-matching PRs (e.g. web-only or
  # docs), so its status stays pending and blocks the merge forever. The
  # checks (cohort surface current, intel safety, renderer bundle) are
  # cheap and pass regardless of which paths a PR touches.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  os:
    name: cohort + intel + renderer checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: install
        run: npm ci --ignore-scripts

      - name: cohort bundle is current
        run: npm run check:cohort

      - name: vendor web assets
        run: npm run vendor:web

      - name: materialize cohort bundle
        run: npm run build:cohort

      - name: privacy boundary scan
        run: node scripts/check-commit-privacy-boundary.mjs --all

      - name: public surface scan
        run: npm run surface:scan

      - name: full unit suite
        run: npm test

      - name: cohort web/electron detail parity
        run: npm run check:cohort-detail-parity

      - name: calendar transcript matches are valid
        run: npm run check:calendar-transcripts

      - name: cohort-facing intel safety
        run: npm --workspace @shape-rotator/os run check:intel

      - name: renderer bundle resolves
        run: npm --workspace @shape-rotator/os run bundle:check
