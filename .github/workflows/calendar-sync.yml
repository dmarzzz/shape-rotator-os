name: calendar-sync

# Builds the live cohort schedule from OUR Shape Rotator admin Google Calendar
# (scripts/build-calendar-from-google.js) into both cohort-data/calendar.json
# (the audit copy) AND apps/os/src/cohort-surface.json (the bundled snapshot
# the Electron app + web mirror read at boot for offline / pre-fetch first
# paint). Runs hourly; on drift, opens/updates an automated PR and
# asks GitHub to auto-merge it after required checks pass.
#
# Why PR + auto-merge (not direct push):
#   Our admin Google calendar is the canonical source of truth for the
#   schedule — we don't want human review as the normal sync path. But main is branch
#   protected, so direct pushes from GITHUB_TOKEN are rejected before required
#   checks can run. A stable automation branch plus auto-merge keeps the same
#   no-human happy path while respecting branch protection.
#
# Why hourly (was 2h):
#   The schedule is human-edited; hourly keeps a same-day edit live within the
#   hour. It does not burn Vercel build credits on no-op runs:
#   build-calendar-from-google.js writes byte-identical files when nothing
#   changed, so the drift check below short-circuits (no commit, no deploy) and
#   an unchanged schedule never triggers a rebuild.
#
# Why it doesn't loop:
#   The sync branch push does not match this workflow's output paths, and the
#   merge commit message carries `[skip ci]` for push-triggered CI. Vercel
#   still deploys the merged main branch artifact.
#
# Auth model:
#   Reads our admin Google Calendar via OAuth (GOOGLE_CALENDAR_ID + the
#   GOOGLE_OAUTH_* secrets the other calendar workflows already use). Also needs
#   pull-request write permission to maintain the automation PR.
#
# Operational note — the fully no-human path depends on two repo settings,
# both currently OFF, so today the open + merge of the sync PR are manual:
#   1. Settings > Actions > General > "Allow GitHub Actions to create and
#      approve pull requests". Without it `gh pr create` fails with
#      "GitHub Actions is not permitted to create or approve pull requests";
#      the branch still pushes, but a human opens the PR the first time.
#   2. Settings > General > "Allow auto-merge". Without it `gh pr merge --auto`
#      cannot queue, so the open PR is merged by hand after checks pass.
#   The branch sync itself works regardless; only PR open/merge needs a human
#   until both are enabled.

on:
  schedule:
    # every hour, on the hour. GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch:        # manual run from the Actions tab
  push:
    branches:
      - main
    paths:
      - "scripts/build-calendar-from-google.js"
      - "cohort-data/calendar-meta.json"
      - "scripts/build-bundles.js"
      - ".github/workflows/calendar-sync.yml"

permissions:
  contents: write
  pull-requests: write

# Serialize: never run two syncs in parallel against main. New runs queue
# behind in-flight ones rather than cancelling, so we don't lose a fetch.
concurrency:
  group: calendar-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a token that can push to main. The default GITHUB_TOKEN
          # works because `permissions: contents: write` is granted above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install deps for build:cohort
        # build-bundles.js needs js-yaml (frontmatter parser). npm ci is
        # cheap on a clean GH runner; lockfile pins it.
        run: npm ci --ignore-scripts

      - name: build cohort-data/calendar.json from our Google calendar
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: node scripts/build-calendar-from-google.js

      - name: rebuild apps/os/src/cohort-surface.json
        # cohort-surface.json is the bundled snapshot the web mirror reads
        # at /cohort-surface.json (vendor:web copies it at Vercel build).
        # build-bundles.js reads cohort-data/calendar.json + the markdown
        # records under cohort-data/ and rewrites the surface.
        run: npm run build:cohort

      - name: rebuild cohort-data/calendar.ics
        # The iCalendar feed importers subscribe to. Regenerated from the same
        # calendar.json so the .ics never lags the schedule. vendor:web copies
        # it to apps/web/calendar.ics at Vercel build → served at /calendar.ics.
        run: npm run build:ics

      - name: detect drift
        id: drift
        run: |
          changed=$(git status --porcelain cohort-data/calendar.json cohort-data/calendar.ics apps/os/src/cohort-surface.json)
          if [[ -z "$changed" ]]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "no schedule change — exiting"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat cohort-data/calendar.json cohort-data/calendar.ics apps/os/src/cohort-surface.json
          fi

      - name: commit + open/update sync PR
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_BRANCH: automation/calendar-sync
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$SYNC_BRANCH"
          git add cohort-data/calendar.json cohort-data/calendar.ics apps/os/src/cohort-surface.json
          git commit -m "chore(calendar): sync schedule from our Google calendar [skip ci]" \
                     -m "Automated hourly refresh. cohort-data/calendar.json is regenerated from our Shape Rotator admin Google Calendar; apps/os/src/cohort-surface.json is regenerated by scripts/build-bundles.js so the bundled snapshot the web mirror serves matches. Triggered by .github/workflows/calendar-sync.yml."
          # actions/checkout only fetched main, so there is no remote-tracking
          # ref for $SYNC_BRANCH and --force-with-lease rejects with "stale info".
          # Fetch it first so the lease is valid (|| true for the first-ever run
          # when the branch does not exist remotely yet).
          git fetch origin "$SYNC_BRANCH" 2>/dev/null || true
          git push --force-with-lease origin "$SYNC_BRANCH"

          title="chore(calendar): sync schedule from our Google calendar"
          body="$(cat <<'BODY'
          Automated hourly calendar refresh.

          This PR is opened by `.github/workflows/calendar-sync.yml` after our Google calendar schedule changes. It updates:

          - `cohort-data/calendar.json`
          - `cohort-data/calendar.ics`
          - `apps/os/src/cohort-surface.json`

          The PR is safe to auto-merge after required checks pass; branch protection blocks direct pushes to `main`.
          BODY
          )"

          pr_number="$(gh pr list --state open --head "$SYNC_BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            if ! pr_url="$(gh pr create --base main --head "$SYNC_BRANCH" --title "$title" --body "$body" 2>pr-error.log)"; then
              echo "::warning::Could not create calendar sync PR. The automation branch was pushed; check whether GitHub Actions may create pull requests."
              sed 's/^/gh: /' pr-error.log
              exit 0
            fi
            pr_number="${pr_url##*/}"
          else
            if ! gh pr edit "$pr_number" --title "$title" --body "$body"; then
              echo "::warning::Could not update calendar sync PR #$pr_number. The automation branch was still pushed."
              exit 0
            fi
          fi

          echo "calendar sync PR #$pr_number"
          if ! gh pr merge "$pr_number" --auto --squash; then
            echo "::warning::Could not enable auto-merge for PR #$pr_number. Check whether repository auto-merge is enabled."
          fi
