name: calendar-sync

# Hourly, two outputs:
#   1. LIVE source (the one that matters for freshness): build the schedule from
#      OUR admin Google Calendar (scripts/build-calendar-from-google.js) and
#      publish the grid to Supabase (public_calendar_grid). The OS + web apps
#      read that row anonymously, so a schedule edit reaches users within the
#      hour — no PR, no merge, no Vercel deploy.
#   2. OFFLINE BUNDLE (fallback only): regenerate the committed
#      cohort-data/calendar.json, calendar.ics, and apps/os/src/cohort-surface.json
#      that the apps use for first-paint / offline, and on drift open a PR for a
#      human to merge. Not the live path, so there is NO auto-merge — a stale
#      bundle just means a brief old-then-live flash on a cold load, corrected
#      the moment Supabase responds.
#
# Why a PR for the bundle (not direct push):
#   main is branch-protected, so the bundle refresh rides an automation branch +
#   PR like any other change. It is low-priority (Supabase is the live source),
#   so a human merges it when convenient.
#
# Why hourly (was 2h):
#   The schedule is human-edited; hourly keeps a same-day edit live within the
#   hour. It does not burn Vercel build credits on no-op runs:
#   build-calendar-from-google.js writes byte-identical files when nothing
#   changed, so the drift check below short-circuits (no commit, no deploy) and
#   an unchanged schedule never triggers a rebuild.
#
# Why it doesn't loop:
#   The sync branch push does not match this workflow's push-trigger paths, and
#   a squash-merge discards the bot's branch commit — so the merged main commit
#   is an ordinary calendar.json change the path filter ignores. We deliberately
#   do NOT tag the commit `[skip ci]`: that would also suppress the required PR
#   status check, leaving every sync PR stuck "expected — waiting for status".
#   Vercel still deploys the merged main branch artifact.
#
# Auth model:
#   Reads our admin Google Calendar via OAuth (GOOGLE_CALENDAR_ID + the
#   GOOGLE_OAUTH_* secrets the other calendar workflows already use). Also needs
#   pull-request write permission to maintain the automation PR.
#
# Operational note: opening the bundle PR needs the repo's "Allow GitHub Actions
# to create pull requests" setting; without it the automation branch still
# pushes and a human opens the PR. The LIVE Supabase publish above does not
# depend on any of this — it just upserts the row.

on:
  schedule:
    # every hour, on the hour. GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch:        # manual run from the Actions tab
  push:
    branches:
      - main
    paths:
      - "scripts/build-calendar-from-google.js"
      - "scripts/publish-calendar-grid-to-supabase.mjs"
      - "scripts/build-ics.js"
      - "cohort-data/calendar-meta.json"
      - "scripts/build-cohort-insights.mjs"
      - "scripts/lib/cohort-insight-engine.cjs"
      - "scripts/build-bundles.js"
      - ".github/workflows/calendar-sync.yml"

permissions:
  contents: write
  pull-requests: write

# Serialize: never run two syncs in parallel against main. New runs queue
# behind in-flight ones rather than cancelling, so we don't lose a fetch.
concurrency:
  group: calendar-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Need a token that can push to main. The default GITHUB_TOKEN
          # works because `permissions: contents: write` is granted above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: install deps for build:cohort
        # build-bundles.js needs js-yaml (frontmatter parser). npm ci is
        # cheap on a clean GH runner; lockfile pins it.
        run: npm ci --ignore-scripts

      - name: build cohort-data/calendar.json from our Google calendar
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: node scripts/build-calendar-from-google.js

      - name: publish calendar grid to Supabase (live source)
        # The apps read this row LIVE (public_calendar_grid), so a schedule
        # change reaches users within the hour without waiting on the git PR
        # merge below or a Vercel deploy. Idempotent: upserts the same grid when
        # nothing changed. Uses the service-role key the other calendar
        # workflows already hold; skips cleanly if the secret is absent.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/publish-calendar-grid-to-supabase.mjs

      # ----------------------------------------------------------------------
      # Self-arm capture on EVERY future cohort event, however it was created
      # (Shape OS app, or an admin editing the shared calendar natively in
      # Google). Neither creation path arms transcription at creation time, so
      # without this the only events that ever capture a transcript are the ones
      # a manual `watch-renewal` dispatch happened to cover. These two steps are
      # the documented reconciler pair (calendar:meet-links + meet-auto-artifacts)
      # and run AFTER the live Supabase publish above, so an arming failure can
      # never block the schedule. They mutate Google only — no repo files are
      # written, no push paths are added — so they cannot cause a drift commit,
      # a Vercel build, or a workflow loop. In-progress meetings are excluded
      # (selection requires start >= now), so a live session is never disturbed.
      - name: compute reconciliation window
        id: window
        run: echo "time_min=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: ensure future Google Meet links
        # Attach a Meet link to every future event that lacks one (a link is the
        # prerequisite for arming transcription). Idempotent: events that already
        # have a Meet link are skipped. sendUpdates=none, so guests get no email.
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: npm run calendar:meet-links:google -- --apply --time-min "${{ steps.window.outputs.time_min }}"

      - name: ensure future Meet transcription
        # Arm Google Meet auto-transcription (transcript ON; recording and smart
        # notes left untouched) on every future event. --skip-if-missing-scope
        # makes this a clean no-op if Cube's token lacks meetings.space.settings,
        # rather than failing the run.
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_OAUTH_SCOPES: ${{ secrets.GOOGLE_OAUTH_SCOPES }}
        run: npm run calendar:meet-auto-artifacts:google -- --apply --time-min "${{ steps.window.outputs.time_min }}" --skip-if-missing-scope

      - name: rebuild apps/os/src/cohort-surface.json
        # cohort-surface.json is the bundled snapshot the web mirror reads
        # at /cohort-surface.json (vendor:web copies it at Vercel build).
        # build-bundles.js reads cohort-data/calendar.json + the markdown
        # records under cohort-data/ and rewrites the surface.
        run: npm run build:cohort

      - name: rebuild cohort-data/calendar.ics
        # The iCalendar feed importers subscribe to. Regenerated from the same
        # calendar.json so the .ics never lags the schedule. vendor:web copies
        # it to apps/web/calendar.ics at Vercel build → served at /calendar.ics.
        run: npm run build:ics

      - name: detect drift
        id: drift
        run: |
          changed=$(git status --porcelain cohort-data/calendar.json cohort-data/calendar.ics apps/os/src/cohort-surface.json)
          if [[ -z "$changed" ]]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "no schedule change — exiting"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat cohort-data/calendar.json cohort-data/calendar.ics apps/os/src/cohort-surface.json
          fi

      - name: refresh committed offline bundle (on drift)
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_BRANCH: automation/calendar-sync
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$SYNC_BRANCH"
          git add cohort-data/calendar.json cohort-data/calendar.ics apps/os/src/cohort-surface.json
          git commit -m "chore(calendar): refresh offline calendar bundle" \
                     -m "Automated hourly refresh of the OFFLINE fallback (cohort-data/calendar.json + calendar.ics + apps/os/src/cohort-surface.json). The LIVE schedule is published to Supabase (public_calendar_grid) in the same run; this commit only keeps the committed first-paint/offline snapshot current. Triggered by .github/workflows/calendar-sync.yml."
          # actions/checkout only fetched main, so there is no remote-tracking
          # ref for $SYNC_BRANCH and --force-with-lease rejects with "stale info".
          # Fetch it first so the lease is valid (|| true for the first-ever run
          # when the branch does not exist remotely yet).
          git fetch origin "$SYNC_BRANCH" 2>/dev/null || true
          git push --force-with-lease origin "$SYNC_BRANCH"

          title="chore(calendar): sync schedule from our Google calendar"
          body="$(cat <<'BODY'
          Automated refresh of the OFFLINE calendar bundle (first-paint / offline fallback).

          The LIVE schedule is published to Supabase (`public_calendar_grid`) in the same workflow run, so this PR is **not** on the freshness critical path — merge it when convenient to keep the committed snapshot current. It updates:

          - `cohort-data/calendar.json`
          - `cohort-data/calendar.ics`
          - `apps/os/src/cohort-surface.json`

          Branch protection blocks direct pushes to `main`.
          BODY
          )"

          pr_number="$(gh pr list --state open --head "$SYNC_BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            if ! pr_url="$(gh pr create --base main --head "$SYNC_BRANCH" --title "$title" --body "$body" 2>pr-error.log)"; then
              echo "::warning::Could not create calendar sync PR. The automation branch was pushed; check whether GitHub Actions may create pull requests."
              sed 's/^/gh: /' pr-error.log
              exit 0
            fi
            pr_number="${pr_url##*/}"
          else
            if ! gh pr edit "$pr_number" --title "$title" --body "$body"; then
              echo "::warning::Could not update calendar sync PR #$pr_number. The automation branch was still pushed."
              exit 0
            fi
          fi

          echo "offline-bundle PR #$pr_number — merge when convenient (Supabase is the live source; no auto-merge)"
