name: google-calendar-watch-renewal

# Manual operator fallback only. The live public schedule is published to
# Supabase, and production calendar reconciliation should run from Supabase Cron
# or another trusted host with Google/Supabase credentials. Keep this workflow
# off GitHub's schedule so GitHub Actions is not the calendar operator.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: google-calendar-watch-renewal
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
      GOOGLE_OAUTH_SCOPES: ${{ secrets.GOOGLE_OAUTH_SCOPES }}
      GOOGLE_CALENDAR_WEBHOOK_TOKEN: ${{ secrets.GOOGLE_CALENDAR_WEBHOOK_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ORG_ID: ${{ secrets.ORG_ID }}
      CALENDAR_CONNECTION_ID: ${{ secrets.CALENDAR_CONNECTION_ID }}
      SHAPE_CALENDAR_BOT_EMAIL: ${{ secrets.SHAPE_CALENDAR_BOT_EMAIL }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: install deps
        run: npm ci --ignore-scripts

      - name: compute reconciliation window
        id: window
        run: echo "time_min=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: renew Google Calendar watch
        run: npm run calendar:watch:google -- --apply

      - name: ensure future Google Meet links
        run: npm run calendar:meet-links:google -- --apply --time-min "${{ steps.window.outputs.time_min }}"

      - name: ensure future capture bot
        run: npm run calendar:capture-bot:google -- --apply --time-min "${{ steps.window.outputs.time_min }}"

      - name: ensure future Meet transcription
        run: npm run calendar:meet-auto-artifacts:google -- --apply --time-min "${{ steps.window.outputs.time_min }}" --skip-if-missing-scope

      - name: sync Google Calendar after renewal
        run: npm run calendar:sync:google -- --apply
