name: github-releases-sync

# Refreshes the cohort GitHub *release* artifacts and the bundled surface so
# the membrane "what's new" feed surfaces new releases (e.g. v0.3.7) without a
# manual run.
#
# What it does:
#   1. scripts/check-github-releases.mjs queries the GitHub Releases API (via
#      gh, authed with the default GITHUB_TOKEN) for every cohort repo and
#      rewrites cohort-data/artifacts/github-releases/generated/*.json.
#      Artifacts carry no generated_at, so they only change when a release
#      actually changes — a no-op run produces byte-identical files.
#   2. npm run build:cohort regenerates apps/os/src/cohort-surface.json, whose
#      whats_new feed + github_releases array are built from those artifacts.
#   3. On drift, pushes an automation branch + opens/updates a PR to main so the
#      web mirror / bundled app pick up the refreshed releases.
#
# Why a PR (not direct push) — was the bug:
#   main is branch-protected (required check "cohort + intel + renderer checks",
#   which runs on pull_request only). This workflow USED to `git push origin
#   HEAD:main` directly, which the protected branch rejected on every run
#   (GH006), so the feed never advanced past the last human-merged surface. The
#   refresh now rides an automation branch + PR like calendar-sync, so the
#   required check runs and the change can land. Unlike calendar-sync there is
#   no live Supabase fallback for releases — the committed surface IS the only
#   path — so this PR must be merged for the feed to update (see auto-merge note).
#
# Auto-merge:
#   The repo currently has "Allow auto-merge" disabled, so the PR waits for a
#   human merge. To make this fully hands-off later: enable Allow auto-merge in
#   repo Settings, then add `gh pr merge "$pr_number" --auto --squash` after the
#   PR is opened below — the required check will gate it.
#
# Why it doesn't loop:
#   The automation-branch push does not match this workflow's main push-trigger
#   paths (it touches cohort-data/artifacts + cohort-surface.json), and a
#   squash-merge discards the bot's branch commit — so the merged main commit is
#   an ordinary surface change the path filter ignores. We deliberately do NOT
#   tag the commit `[skip ci]`: that would suppress the required PR status check,
#   leaving every sync PR stuck "expected — waiting for status".
#
# Auth model:
#   The default GITHUB_TOKEN can read releases for public repos. Private or
#   missing repos are skipped gracefully by the generator (logged, not fatal).
#   Opening the PR needs pull-requests:write + the repo's "Allow GitHub Actions
#   to create pull requests" setting; without it the automation branch still
#   pushes and a human opens the PR.
#
# Cadence:
#   Hourly. Releases are low-frequency, but the byte-stable artifacts mean a
#   no-op hour stops at the drift check — no commit, no PR, no rebuild churn. So
#   hourly only shortens "new release → feed" to ~an hour; the sole added cost
#   is cheap runner minutes (~1 min/run). Run at :23, off the top of the hour,
#   where GitHub's scheduler is least congested (on-the-hour crons are routinely
#   delayed or dropped under load).

on:
  schedule:
    - cron: "23 * * * *"    # hourly at :23 UTC. GitHub may still delay under load.
  workflow_dispatch:        # manual run from the Actions tab
  push:
    branches:
      - main
    paths:
      - "scripts/check-github-releases.mjs"
      - "scripts/build-bundles.js"
      - ".github/workflows/github-releases-sync.yml"

permissions:
  contents: write
  pull-requests: write

# Serialize against main; queue rather than cancel so we never drop a refresh.
concurrency:
  group: github-releases-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm     # hourly cadence → cache npm to keep each run ~1 min

      - name: install deps for build:cohort
        # build-bundles.js needs js-yaml (frontmatter parser); the lockfile
        # pins it. --ignore-scripts skips native rebuilds we don't need.
        run: npm ci --ignore-scripts

      - name: refresh github-releases artifacts
        # gh is preinstalled on ubuntu-latest; GH_TOKEN authenticates it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run audit:github-releases -- --write-artifacts

      - name: rebuild apps/os/src/cohort-surface.json
        run: npm run build:cohort

      - name: detect drift
        id: drift
        run: |
          changed=$(git status --porcelain cohort-data/artifacts/github-releases apps/os/src/cohort-surface.json)
          if [[ -z "$changed" ]]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "no release change — exiting"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat cohort-data/artifacts/github-releases apps/os/src/cohort-surface.json
          fi

      - name: open/update release-sync PR (on drift)
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_BRANCH: automation/github-releases-sync
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$SYNC_BRANCH"
          # Stage the cohort-insights artifacts too: build:cohort regenerates
          # them and the required PR check (check:cohort → build-cohort-insights
          # --check) verifies they match a fresh build. The "shipped" / release-
          # count insight cards are derived from these same releases, so a new
          # release changes that manifest; committing only the surface would
          # leave it stale and fail the check.
          git add cohort-data/artifacts/github-releases cohort-data/artifacts/cohort-insights apps/os/src/cohort-surface.json
          git commit -m "chore(releases): sync cohort GitHub releases" \
                     -m "Automated refresh. scripts/check-github-releases.mjs re-lists releases per cohort repo; apps/os/src/cohort-surface.json is regenerated by scripts/build-bundles.js so the membrane feed matches. Triggered by .github/workflows/github-releases-sync.yml."
          # actions/checkout only fetched main, so there is no remote-tracking
          # ref for $SYNC_BRANCH and --force-with-lease rejects with "stale info".
          # Fetch it first so the lease is valid (|| true for the first-ever run
          # when the branch does not exist remotely yet).
          git fetch origin "$SYNC_BRANCH" 2>/dev/null || true
          git push --force-with-lease origin "$SYNC_BRANCH"

          title="chore(releases): sync cohort GitHub releases"
          body="$(cat <<'BODY'
          Automated refresh of the membrane "what's new" release feed.

          Regenerates, from the live GitHub Releases API:

          - `cohort-data/artifacts/github-releases/generated/*.json`
          - `cohort-data/artifacts/cohort-insights/generated/manifest.json` (release-derived "shipped" cards)
          - `apps/os/src/cohort-surface.json` (`whats_new` + `github_releases`)

          The committed surface is the ONLY source for the release feed (there is
          no live Supabase fallback like the calendar has), so this PR must be
          merged for the feed to advance. Branch protection blocks direct pushes
          to `main`, which is why this rides a PR. Triggered by
          `.github/workflows/github-releases-sync.yml`.
          BODY
          )"

          pr_number="$(gh pr list --state open --head "$SYNC_BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            if ! pr_url="$(gh pr create --base main --head "$SYNC_BRANCH" --title "$title" --body "$body" 2>pr-error.log)"; then
              echo "::warning::Could not create release sync PR. The automation branch was pushed; check whether GitHub Actions may create pull requests."
              sed 's/^/gh: /' pr-error.log
              exit 0
            fi
            pr_number="${pr_url##*/}"
          else
            if ! gh pr edit "$pr_number" --title "$title" --body "$body"; then
              echo "::warning::Could not update release sync PR #$pr_number. The automation branch was still pushed."
              exit 0
            fi
          fi

          echo "release-feed PR #$pr_number — merge to advance the membrane feed (auto-merge is off; see workflow header)"
