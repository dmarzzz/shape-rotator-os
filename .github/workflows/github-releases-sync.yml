name: github-releases-sync

# Refreshes the cohort GitHub *release* artifacts and the bundled surface so
# the membrane "what's new" feed surfaces new releases (e.g. v0.3.5) without a
# manual run. Mirrors calendar-sync.yml's direct-to-main model.
#
# What it does:
#   1. scripts/check-github-releases.mjs queries the GitHub Releases API (via
#      gh, authed with the default GITHUB_TOKEN) for every cohort repo and
#      rewrites cohort-data/artifacts/github-releases/generated/*.json.
#      Artifacts carry no generated_at, so they only change when a release
#      actually changes — a no-op run produces byte-identical files.
#   2. npm run build:cohort regenerates apps/os/src/cohort-surface.json, whose
#      whats_new feed + github_releases array are built from those artifacts.
#   3. On drift, commits directly to main (with [skip ci]) so the web mirror /
#      bundled app pick up the refreshed releases.
#
# Auth model:
#   The default GITHUB_TOKEN can read releases for public repos. Private or
#   missing repos are skipped gracefully by the generator (logged, not fatal).
#
# Cadence:
#   Hourly. Releases are low-frequency, but the byte-stable artifacts mean a
#   no-op hour stops at the drift check — no commit, no Vercel deploy, no
#   rebuild churn. So hourly only shortens "new release → feed" from a day to
#   ~an hour; the sole added cost is cheap runner minutes (~1 min/run). Run at
#   :23, off the top of the hour, where GitHub's scheduler is least congested
#   (on-the-hour crons are routinely delayed or dropped under load).

on:
  schedule:
    - cron: "23 * * * *"    # hourly at :23 UTC. GitHub may still delay under load.
  workflow_dispatch:        # manual run from the Actions tab
  push:
    branches:
      - main
    paths:
      - "scripts/check-github-releases.mjs"
      - "scripts/build-bundles.js"
      - ".github/workflows/github-releases-sync.yml"

permissions:
  contents: write

# Serialize against main; queue rather than cancel so we never drop a refresh.
concurrency:
  group: github-releases-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm     # hourly cadence → cache npm to keep each run ~1 min

      - name: install deps for build:cohort
        # build-bundles.js needs js-yaml (frontmatter parser); the lockfile
        # pins it. --ignore-scripts skips native rebuilds we don't need.
        run: npm ci --ignore-scripts

      - name: refresh github-releases artifacts
        # gh is preinstalled on ubuntu-latest; GH_TOKEN authenticates it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run audit:github-releases -- --write-artifacts

      - name: rebuild apps/os/src/cohort-surface.json
        run: npm run build:cohort

      - name: detect drift
        id: drift
        run: |
          changed=$(git status --porcelain cohort-data/artifacts/github-releases apps/os/src/cohort-surface.json)
          if [[ -z "$changed" ]]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "no release change — exiting"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat cohort-data/artifacts/github-releases apps/os/src/cohort-surface.json
          fi

      - name: commit + push to main
        if: steps.drift.outputs.drift == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cohort-data/artifacts/github-releases apps/os/src/cohort-surface.json
          git commit -m "chore(releases): sync cohort GitHub releases [skip ci]" \
                     -m "Automated daily refresh. scripts/check-github-releases.mjs re-lists releases per cohort repo; apps/os/src/cohort-surface.json is regenerated by scripts/build-bundles.js so the membrane feed matches. Triggered by .github/workflows/github-releases-sync.yml."
          git push origin HEAD:main
